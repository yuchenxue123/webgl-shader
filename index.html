<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GLSL Shader Playground</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%231e1e1e'/><circle cx='16' cy='16' r='10' fill='none' stroke='%23007acc' stroke-width='2'/><circle cx='16' cy='16' r='4' fill='%23007acc'/></svg>" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <canvas id="gl-canvas"></canvas>

  <div id="panel">
    <div id="toolbar">
      <select id="preset-select"></select>
      <span id="compile-status" class="status-ok">OK</span>
    </div>
    <div id="editor-area">
      <textarea id="code-editor" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>
      <div id="uniforms-panel"></div>
    </div>
    <pre id="error-display"></pre>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
