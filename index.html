<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GLSL Shader Playground</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <canvas id="gl-canvas"></canvas>

  <div id="panel">
    <div id="toolbar">
      <select id="preset-select"></select>
      <span id="compile-status" class="status-ok">OK</span>
    </div>
    <div id="editor-area">
      <textarea id="code-editor" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>
      <div id="uniforms-panel"></div>
    </div>
    <pre id="error-display"></pre>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
